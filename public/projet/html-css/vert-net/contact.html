<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="asset/css/style_contact.css" />
  <title>Contact — VertiNet</title>
</head>
<body>
  <header>
    <div class="logo">VertiNet</div>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="equipe.html">Equipe</a>
    </nav>
  </header>

  <main>
    <h1>Contactez-nous</h1>
    <p class="intro">Une question, un conseil, un partenariat ? Écrivez-nous, nous vous répondrons rapidement.</p>

    <form action="#" method="post">
      <div class="form-group">
        <label for="nom">Nom</label>
        <input type="text" id="nom" name="nom" required />
      </div>

      <div class="form-group">
        <label for="prenom">Prénom</label>
        <input type="text" id="prenom" name="prenom" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" required />
      </div>

      <div class="form-group">
        <label for="tel">Téléphone</label>
        <input type="tel" id="tel" name="tel" />
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" required></textarea>
      </div>

      <div class="rgpd">
        <input type="checkbox" id="rgpd" name="rgpd" required />
        <label for="rgpd">J’accepte le traitement de mes données conformément à la politique de confidentialité de VertiNet.</label>
      </div>

      <button type="submit">Envoyer</button>
    </form>
  </main>

  <footer>
    © 2025 VertiNet — Cultivez votre passion du jardinage
  </footer>
</body>
</html>
