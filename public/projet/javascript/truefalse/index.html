<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>True or False</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"> <!-- [web:7][web:10] -->

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>
  <div class="container">
    <h1>True Or False</h1>

    <p id="time">60</p>

    <div id="btnContainer">
      <button id="start"></button>
      <div class="responses">
        <button id="right" class="response">TRUE</button>
        <button id="wrong" class="response">FALSE</button>
      </div>
    </div>

    <div class="score-container">
      <p>Score</p>
      <p id="score">0</p>
    </div>
  </div>
</body>
</html>
